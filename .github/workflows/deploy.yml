name: Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 51.38.185.245
          username: ubuntu
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /opt/conducteurpro
            sudo git fetch origin main
            sudo git reset --hard origin/main
            echo "=== Latest commit ==="
            sudo git log -1 --oneline
            echo "=== Installing dependencies ==="
            sudo /opt/conducteurpro/venv/bin/pip install -r requirements.txt 2>&1 | tail -5
            echo "=== Restarting service ==="
            sudo systemctl restart conducteurpro
            sleep 3
            sudo systemctl status conducteurpro --no-pager
            echo "=== Deploy complete ==="
